services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    env_file:
      - .env.local
    environment:
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-credentials.json
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/templates:/app/templates
      - ./apps/api/gcs-credentials.json:/app/gcs-credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-credentials.json
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/templates:/app/templates
      - ./apps/api/gcs-credentials.json:/app/gcs-credentials.json:ro
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
