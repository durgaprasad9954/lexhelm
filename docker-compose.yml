version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lexhelm_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "9000:8080"
    env_file:
      - .env.local
    environment:
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-credentials.json
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/templates:/app/templates
      - ./apps/api/gcs-credentials.json:/app/gcs-credentials.json:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-credentials.json
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/templates:/app/templates
      - ./apps/api/gcs-credentials.json:/app/gcs-credentials.json:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
